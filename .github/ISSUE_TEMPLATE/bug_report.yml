name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to /admin/invites
        2. Click "Create Invite"
        3. Set expiry to 0
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or paste error logs from the browser console or Docker logs.

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker
        - Docker Compose
        - Built from source
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Portalrr version
      description: Check the bottom of the admin sidebar, or your Docker image tag.
      placeholder: "1.0.0"

  - type: dropdown
    id: server-type
    attributes:
      label: Media server
      options:
        - Jellyfin
        - Plex
        - Both
        - Not applicable

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "Chrome 125, Firefox 128, Safari 18, etc."
