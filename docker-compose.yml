services:
  portalrr:
    build: .
    container_name: portalrr
    restart: unless-stopped
    ports:
      - "3939:3939"
    volumes:
      - portalrr-data:/app/prisma/data
    environment:
      - DATABASE_URL=file:./data/portalrr.db
      # REQUIRED: Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Set to 'true' if accessing over HTTP (no HTTPS/reverse proxy)
      # - INSECURE_COOKIES=true
      # Set to '1' if behind a reverse proxy (Nginx, Traefik, Caddy)
      # - TRUSTED_PROXY_COUNT=1
      # Your public URL — used in password reset emails
      # - APP_URL=https://invite.example.com

volumes:
  portalrr-data:
